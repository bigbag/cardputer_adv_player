[env:cardputer-adv]
platform = espressif32@6.7.0
board = m5stack-stamps3
framework = arduino
; Native USB-JTAG (303a:1001 → /dev/ttyACM0). High baud after stub often
; kills the ACM device; stay at 115200.
upload_speed = 115200
monitor_speed = 115200
board_upload.wait_for_upload_port = true
; Prefer esptool over esp-builtin unless you wire external JTAG.
upload_protocol = esptool
lib_ldf_mode = deep
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_LOOP_STACK_SIZE=16384
    -std=gnu++17
    -Ilib/minimp3
lib_deps =
    m5stack/M5Cardputer@^1.0.3

; Same firmware, flash without ROM stub (helps some USB-JTAG dropouts)
[env:cardputer-adv-nostub]
platform = espressif32@6.7.0
board = m5stack-stamps3
framework = arduino
extends = env:cardputer-adv
upload_flags =
    --no-stub

[env:native]
platform = native
test_framework = unity
test_build_src = true
build_flags =
    -std=gnu++17
    -DUNIT_TEST
    -Iinclude
    -Isrc
build_src_filter =
    +<path_utils.cpp>
    +<decoders/wav_decoder.cpp>
