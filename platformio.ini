[env:cardputer-adv]
platform = espressif32@6.7.0
board = m5stack-stamps3
framework = arduino
upload_speed = 1500000
monitor_speed = 115200
lib_ldf_mode = deep
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DBOARD_HAS_PSRAM=0
    -std=gnu++17
lib_deps =
    m5stack/M5Cardputer@^1.0.3

[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -DUNIT_TEST
